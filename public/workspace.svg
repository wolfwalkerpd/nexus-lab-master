      <rect x="115" y="330" width="260" height="175" rx="10" fill="#1c2430"/>
      <rect x="123" y="338" width="244" height="159" rx="5" fill="#fbf9f3"/>
      <rect x="123" y="338" width="244" height="28" rx="5" fill="#ede7d8"/>
      <circle cx="137" cy="352" r="3.8" fill="#b7472a"/><circle cx="150" cy="352" r="3.8" fill="#d6b24a"/><circle cx="163" cy="352" r="3.8" fill="#7a9a6d"/>
      <rect x="140" y="384" width="74" height="10" rx="5" fill="#b7472a" opacity="0.9"/>
      <rect x="140" y="402" width="160" height="15" rx="4" fill="#191712"/>
      <rect x="140" y="424" width="128" height="15" rx="4" fill="#191712"/>
      <rect x="140" y="450" width="96" height="26" rx="13" fill="#b7472a"/>
      <rect x="308" y="384" width="52" height="92" rx="8" fill="#ede7d8"/>
