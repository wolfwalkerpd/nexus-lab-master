<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 800" width="480" height="800" font-family="'Work Sans',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0e6"/><stop offset="1" stop-color="#ede7d8"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#191712" flood-opacity="0.14"/></filter>
    <filter id="sh2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#191712" flood-opacity="0.13"/></filter>
    <clipPath id="r"><rect width="480" height="800" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#r)">
    <rect width="480" height="800" fill="url(#bg)"/>

    <!-- TOP: brand ring on back wall -->
    <circle cx="110" cy="130" r="56" fill="none" stroke="#b7472a" stroke-width="3" opacity="0.4"/>
    <circle cx="110" cy="130" r="35" fill="none" stroke="#b7472a" stroke-width="3" opacity="0.3"/>

    <!-- floating shelf with books + plant -->
    <g filter="url(#sh2)"><rect x="270" y="120" width="170" height="13" rx="3" fill="#b98a5e"/></g>
    <rect x="286" y="78" width="13" height="42" rx="2" fill="#1c2430"/>
    <rect x="301" y="70" width="13" height="50" rx="2" fill="#b7472a"/>
    <rect x="316" y="82" width="13" height="38" rx="2" fill="#d6b24a"/>
    <rect x="331" y="74" width="13" height="46" rx="2" fill="#7a9a6d"/>
    <path d="M392 120 q-6 -32 -18 -42 M392 120 q0 -36 0 -50 M392 120 q6 -32 18 -42" stroke="#7a9a6d" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M380 120 h24 l-3 -22 h-18 z" fill="#b7472a"/>

    <!-- design tokens swatch chip -->
    <g filter="url(#sh2)">
      <rect x="60" y="250" width="120" height="46" rx="10" fill="#fbf9f3"/>
      <circle cx="84" cy="273" r="11" fill="#1c2430"/><circle cx="110" cy="273" r="11" fill="#b7472a"/><circle cx="136" cy="273" r="11" fill="#d6b24a"/><circle cx="162" cy="273" r="11" fill="#ede7d8" stroke="#19171220"/>
    </g>

    <!-- MIDDLE: monitor with website -->
