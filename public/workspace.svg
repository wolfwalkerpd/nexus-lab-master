    <g fill="#8a8578" opacity="0.12">
      <circle cx="300" cy="300" r="1.6"/><circle cx="300" cy="326" r="1.6"/><circle cx="300" cy="352" r="1.6"/><circle cx="300" cy="378" r="1.6"/><circle cx="300" cy="404" r="1.6"/><circle cx="326" cy="300" r="1.6"/><circle cx="326" cy="326" r="1.6"/><circle cx="326" cy="352" r="1.6"/><circle cx="326" cy="378" r="1.6"/><circle cx="326" cy="404" r="1.6"/><circle cx="352" cy="300" r="1.6"/><circle cx="352" cy="326" r="1.6"/><circle cx="352" cy="352" r="1.6"/><circle cx="352" cy="378" r="1.6"/><circle cx="352" cy="404" r="1.6"/><circle cx="378" cy="300" r="1.6"/><circle cx="378" cy="326" r="1.6"/><circle cx="378" cy="352" r="1.6"/><circle cx="378" cy="378" r="1.6"/><circle cx="378" cy="404" r="1.6"/><circle cx="404" cy="300" r="1.6"/><circle cx="404" cy="326" r="1.6"/><circle cx="404" cy="352" r="1.6"/><circle cx="404" cy="378" r="1.6"/><circle cx="404" cy="404" r="1.6"/><circle cx="430" cy="300" r="1.6"/><circle cx="430" cy="326" r="1.6"/><circle cx="430" cy="352" r="1.6"/><circle cx="430" cy="378" r="1.6"/><circle cx="430" cy="404" r="1.6"/>
    </g>

    <!-- wordmark bottom -->
    <g transform="translate(40,748)">
      <circle cx="12" cy="12" r="12" fill="#191712"/>
      <circle cx="12" cy="12" r="6.8" fill="none" stroke="#f4f0e6" stroke-width="2.2"/>
      <text x="34" y="18" font-size="18" fill="#191712" font-family="'Instrument Serif',Georgia,serif">Nexus LabSystems</text>
    </g>
    <text x="440" y="760" font-size="10.5" fill="#8a8578" text-anchor="end" font-family="'IBM Plex Mono',monospace" letter-spacing="1">DESIGN · BUILD · RANK</text>
  </g>
</svg>