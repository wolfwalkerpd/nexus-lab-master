      <rect x="167" y="611" width="10" height="6" rx="1.5"/><rect x="181" y="611" width="10" height="6" rx="1.5"/><rect x="195" y="611" width="10" height="6" rx="1.5"/><rect x="209" y="611" width="10" height="6" rx="1.5"/><rect x="223" y="611" width="10" height="6" rx="1.5"/><rect x="237" y="611" width="10" height="6" rx="1.5"/><rect x="251" y="611" width="10" height="6" rx="1.5"/><rect x="265" y="611" width="10" height="6" rx="1.5"/><rect x="279" y="611" width="10" height="6" rx="1.5"/><rect x="293" y="611" width="10" height="6" rx="1.5"/>
    </g>

    <!-- coffee mug -->
    <g filter="url(#sh2)">
      <rect x="360" y="524" width="42" height="32" rx="6" fill="#b7472a"/>
      <path d="M402 531 q17 2 17 13 q0 11 -17 13" fill="none" stroke="#b7472a" stroke-width="4.5"/>
    </g>
    <path d="M372 520 q-3 -9 2 -15 M383 520 q-3 -9 2 -15" stroke="#8a8578" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- notebook + pen -->
    <g filter="url(#sh2)" transform="rotate(-8 95 545)">
      <rect x="52" y="520" width="96" height="64" rx="6" fill="#fbf9f3"/>
      <line x1="63" y1="537" x2="138" y2="537" stroke="#8a8578" stroke-width="2" opacity="0.5"/>
      <line x1="63" y1="552" x2="120" y2="552" stroke="#8a8578" stroke-width="2" opacity="0.5"/>
      <line x1="63" y1="567" x2="130" y2="567" stroke="#8a8578" stroke-width="2" opacity="0.5"/>
