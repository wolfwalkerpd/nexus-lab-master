    <rect x="30" y="582" width="420" height="4" fill="#00000018"/>
    <rect x="70" y="582" width="11" height="120" fill="#b98a5e" opacity="0.85"/>
    <rect x="399" y="582" width="11" height="120" fill="#b98a5e" opacity="0.85"/>

